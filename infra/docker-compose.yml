# Kasa local stack. Only hard infra dependency is Postgres (jobs/queue use
# SELECT … FOR UPDATE SKIP LOCKED, no external broker). The backend image serves both the API and
# the worker; a one-shot `migrate` service applies Alembic migrations before either starts.
#
# Build contexts are the repo ROOT (..) so the images can COPY the shared trees / workspace packages.
name: kasa

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kasa}
      POSTGRES_DB: ${POSTGRES_DB:-kasa}
    ports:
      - "5433:5432" # host 5433 to avoid clashing with a local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kasa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  hardhat-node:
    # Local EVM for dev/CI (public testnets used for the hosted demo).
    image: node:20-alpine
    working_dir: /app/contracts
    command: sh -c "corepack enable && pnpm install && pnpm hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    volumes:
      - ../:/app

  # One-shot DB migration (creates tables + seeds assets from the registry), gating the API + worker.
  migrate:
    image: kasa-backend:local
    command: ["alembic", "upgrade", "head"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kasa}:${POSTGRES_PASSWORD:-kasa}@postgres:5432/${POSTGRES_DB:-kasa}
    depends_on:
      postgres:
        condition: service_healthy

  # backend API (FastAPI). Owns the shared backend image build.
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: kasa-backend:local
    env_file: ../.env
    environment:
      # Inside the compose network reach Postgres by service name (overrides the host .env value).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kasa}:${POSTGRES_PASSWORD:-kasa}@postgres:5432/${POSTGRES_DB:-kasa}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5

  # worker (watcher + withdrawal processor) — shares the backend image, different command.
  worker:
    image: kasa-backend:local
    command: ["python", "-m", "worker.main"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-kasa}:${POSTGRES_PASSWORD:-kasa}@postgres:5432/${POSTGRES_DB:-kasa}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # frontend (Next.js). Browser-side calls hit the host-mapped API at localhost:8000.
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: kasa-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
